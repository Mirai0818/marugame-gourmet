<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丸亀駅グルメ</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#0066cc;
    color:white;
    padding:20px;
    text-align:center;
}

.search{
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    box-sizing:border-box;
}

.shop{
    background:white;
    margin:10px;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>丸亀駅グルメ</h1>
<p>丸亀駅周辺の飲食店検索サイト</p>
</header>

<div class="search">
<input type="text" placeholder="店名を検索">
</div>

<div class="shop">
<h3>サンプルうどん店</h3>
<p>丸亀駅から徒歩5分</p>
</div>

<div class="shop">
<h3>サンプルカフェ</h3>
<p>丸亀駅から徒歩3分</p>
</div>

</body>
</html>
